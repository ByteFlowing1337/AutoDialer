name: wheels

on:
  push:
    branches: [main]
    paths: ["src/**", "tests/**", ".github/workflows/wheels.yml"]

  pull_request:
    paths: ["src/**", "tests/**", ".github/workflows/wheels.yml"]

  workflow_dispatch:

  workflow_call:
    inputs:
      upload_artifacts:
        required: false
        type: boolean
        default: false

jobs:
  build-wheel:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Check wheel metadata
        run: python -m twine check dist/*.whl

      - name: Upload wheels
        if: ${{ github.event_name != 'workflow_call' || inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
          retention-days: 1
