name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -t . -p "test_*.py"

  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  smoke-check:
    name: Smoke check (Python 3.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Install built wheel
        run: pip install --force-reinstall dist/*.whl

      - name: Verify package metadata and entry points
        run: |
          python - << 'PY'
          import importlib.metadata as m

          version = m.version("AutoDialer")
          console_scripts = {
              e.name: e.value
              for e in m.entry_points(group="console_scripts")
              if e.name in {"autodialer", "autodialer-devices"}
          }

          assert "autodialer" in console_scripts, "missing autodialer entry point"
          assert "autodialer-devices" in console_scripts, "missing autodialer-devices entry point"
          print("version:", version)
          print("entry points:", console_scripts)
          PY
